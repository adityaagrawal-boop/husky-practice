name: Run Vitest Tests

on:
  push:
  pull_request:

jobs:
  test:
    name: 🧪 Vitest Tests
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧪 Run Vitest tests
        run: npx vitest run

      - name: ✅ Tests passed
        if: success()
        run: echo "🎉 All tests passed!"

      - name: ❌ Tests failed
        if: failure()
        run: echo "❌ Tests failed! PR cannot be merged."
